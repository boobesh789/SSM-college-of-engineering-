name: ssm_student_hub
description: "A comprehensive Flutter + Firebase College ERP mobile application for student information management."
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.24.0
  firebase_auth: ^4.13.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.0

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_generator: ^2.3.0

  # UI & Navigation
  go_router: ^12.0.0
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0

  # Material Design
  material_design_icons_flutter: ^7.0.0

  # File & Image Handling
  file_picker: ^6.1.0
  image_picker: ^1.0.4
  pdf: ^3.10.0
  printing: ^5.11.0
  image: ^4.1.0

  # PDF & Document Handling
  syncfusion_flutter_pdfviewer: ^23.2.0
  flutter_pdfview: ^1.3.0

  # Data & Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.1
  intl: ^0.19.0

  # HTTP & Networking
  dio: ^5.4.0
  http: ^1.1.0

  # Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0

  # Utilities
  uuid: ^4.0.0
  logger: ^2.0.0
  connectivity_plus: ^5.0.0
  device_info_plus: ^9.1.0
  package_info_plus: ^5.0.0

  # Date & Time
  intl_utils: ^2.8.5

  # Notifications
  flutter_local_notifications: ^16.0.0

  # Charts & Analytics
  fl_chart: ^0.63.0

  # Localization
  flutter_localizations:
    sdk: flutter

  # Freezed for immutable models
  freezed_annotation: ^2.4.0

  # Permission handling
  permission_handler: ^11.4.0

  # Email validation
  email_validator: ^2.1.0

  # QR Code
  qr_flutter: ^4.1.0

  # Cupertino Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/logos/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
